services:
  db:
    image: postgres:15
    container_name: fastapi_1c_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  fake_1c:
    build:
      context: ../fake_1c
      dockerfile: Dockerfile
    container_name: fastapi_fake_1c
    ports:
      - "9000:9000"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fastapi_1c_api
    depends_on:
      db:
        condition: service_healthy
      fake_1c:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      poetry run uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  pgadmin:
    image: dpage/pgadmin4
    container_name: fastapi_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data: